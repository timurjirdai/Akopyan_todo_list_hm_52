<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Список задач:</h1>

{% for task in tasks %}
    <div>
        <h3>{{ task.description }}</h3>
        <p>Статус: {{ task.status }}</p>
        <p>Дата выполнения: {{ task.date }}</p>
    </div>
    <hr>
{% endfor %}
</body>
</html>
